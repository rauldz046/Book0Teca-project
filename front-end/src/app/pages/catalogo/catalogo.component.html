<div class="catalog-container">
  
  <!-- Toolbar Superior -->
  <div class="catalog-header">
    <div class="search-bar">
      <i class="pi pi-search"></i>
      <input type="text" placeholder="Buscar por título, autor ou ISBN..." (input)="onSearch($any($event.target).value)">
    </div>
    
    <div class="actions">
      <button class="btn-add" >
        <i class="pi pi-plus"></i> Novo Livro
      </button>
      <select class="sort-select">
        <option>Mais Recentes</option>
        <option>Preço: Menor para Maior</option>
        <option>A-Z</option>
      </select>
    </div>
  </div>

  <div class="catalog-layout">
    <!-- Filtros Laterais -->
    <aside class="filters-sidebar">
      <h3>Filtros</h3>
      <div class="filter-group">
        <h4>Categorias</h4>
        <label><input type="checkbox"> Fantasia</label>
        <label><input type="checkbox"> Terror</label>
        <label><input type="checkbox"> Romance</label>
      </div>
      <div class="filter-group">
        <h4>Disponibilidade</h4>
        <label><input type="radio" name="disp"> Disponíveis</label>
        <label><input type="radio" name="disp"> Ver Todos</label>
      </div>
    </aside>

    <!-- Grid de Livros -->
    <main class="books-grid">
      <app-catalogo 
        *ngFor="let item of filteredBooks" 
        [book]="item">
      </app-catalogo>
      
      <!-- Empty State -->
      <div class="empty-state" *ngIf="filteredBooks.length === 0">
        <i class="pi pi-search-minus"></i>
        <p>Nenhum livro encontrado para sua busca.</p>
      </div>
    </main>
  </div>
</div>
