<div class="p-4">
  <p-toast></p-toast>
  <p-confirmPopup></p-confirmPopup>

  <!-- HEADER OPERACIONAL -->
  <div class="flex flex-column md:flex-row justify-content-between align-items-center mb-4 bg-white p-4 shadow-1 border-round">
    <div>
      <h1 class="text-3xl font-bold m-0 text-900">Gerenciamento de Empréstimos</h1>
      <div class="flex gap-3 mt-2">
        <span class="text-green-600 font-semibold"><i class="pi pi-check-circle mr-1"></i>85 Ativos</span>
        <span class="text-red-600 font-semibold"><i class="pi pi-clock mr-1"></i>12 Atrasados</span>
      </div>
    </div>
    <div class="flex gap-2 mt-3 md:mt-0">
      <button pButton label="Novo Empréstimo" icon="pi pi-plus" class="p-button-raised" (click)="displayNovoEmprestimo = true"></button>
      <button pButton label="Relatório de Atrasos" icon="pi pi-print" class="p-button-outlined p-button-danger"></button>
    </div>
  </div>

  <!-- BARRA DE PESQUISA E FILTROS -->
  <div class="surface-card p-3 shadow-1 border-round mb-4 flex flex-wrap gap-3 align-items-center">
    <div class="p-inputgroup flex-1 min-w-max">
        <span class="p-inputgroup-addon"><i class="pi pi-search"></i></span>
        <input pInputText placeholder="Buscar por Nome, Matrícula ou Título do Livro..." class="w-full" />
    </div>
    <p-selectButton [options]="['TODOS', 'ATIVO', 'ATRASADO', 'DEVOLVIDO']" [(ngModel)]="filtroStatus"></p-selectButton>
  </div>

  <!-- TABELA DE GESTÃO -->
  <p-table [value]="emprestimos" [rows]="10" [paginator]="true" responsiveLayout="stack" breakpoint="960px"
           styleClass="p-datatable-lg p-datatable-striped shadow-1">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 25%">Leitor</th>
        <th style="width: 25%">Livro</th>
        <th>Empréstimo</th>
        <th>Vencimento</th>
        <th>Renov.</th>
        <th>Status</th>
        <th class="text-center">Ações</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-emp>
      <tr [ngClass]="{'bg-red-50': emp.status === 'ATRASADO'}">
        <td>
          <div class="flex flex-column">
            <span class="font-bold text-900">{{emp.leitor}}</span>
            <small class="text-600">Matrícula: {{emp.matricula}}</small>
          </div>
        </td>
        <td>
          <div class="flex align-items-center">
            <i class="pi pi-book mr-2 text-400"></i>
            <span class="font-medium">{{emp.livro}}</span>
          </div>
        </td>
        <td>{{emp.dataEmprestimo | date:'dd/MM/yyyy'}}</td>
        <td>
          <span [class]="emp.status === 'ATRASADO' ? 'text-red-600 font-bold' : ''">
            {{emp.dataDevolucaoPrevista | date:'dd/MM/yyyy'}}
          </span>
        </td>
        <td class="text-center">
            <span class="p-badge p-badge-info">{{emp.renovacoes}}/3</span>
        </td>
        <td>
          <p-tag [value]="emp.status" [severity]="getSeverity(emp.status)"></p-tag>
        </td>
        <td>
          <div class="flex justify-content-center gap-2">
            <button pButton icon="pi pi-sync" class="p-button-rounded p-button-text p-button-info" 
                    title="Renovar" (click)="renovar(emp)" [disabled]="emp.status === 'DEVOLVIDO'"></button>
            <button pButton icon="pi pi-check-square" class="p-button-rounded p-button-text p-button-success" 
                    title="Devolver" (click)="confirmarDevolucao($event, emp)" [disabled]="emp.status === 'DEVOLVIDO'"></button>
            <button pButton icon="pi pi-ellipsis-v" class="p-button-rounded p-button-text p-button-secondary"></button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- DIALOG NOVO EMPRÉSTIMO -->
<p-dialog header="Registrar Novo Empréstimo" [(visible)]="displayNovoEmprestimo" [modal]="true" [style]="{width: '500px'}">
    <div class="flex flex-column gap-3 mt-2">
        <div class="flex flex-column gap-2">
            <label class="font-bold">Leitor (Matrícula ou Nome)</label>
            <input pInputText placeholder="Ex: 2023001 ou João Silva" />
        </div>
        <div class="flex flex-column gap-2">
            <label class="font-bold">Livro (ISBN ou Título)</label>
            <input pInputText placeholder="Ex: 978-3-16..." />
        </div>
        <div class="flex flex-column gap-2">
            <label class="font-bold">Data de Devolução</label>
            <p-calendar appendTo="body"></p-calendar>
        </div>
    </div>
    <ng-template pTemplate="footer">
        <button pButton label="Cancelar" class="p-button-text" (click)="displayNovoEmprestimo = false"></button>
        <button pButton label="Finalizar Empréstimo" icon="pi pi-check"></button>
    </ng-template>
</p-dialog>
