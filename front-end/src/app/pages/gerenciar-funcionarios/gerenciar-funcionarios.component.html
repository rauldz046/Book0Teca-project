<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciamento de Funcionários</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#4b7c3a;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    padding:30px;
    max-width: 80rem;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    border:none;
    background:#4b7c3a;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3c632f;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

th{
    background:#ececec;
}

.actions button{
    background:#3498db;
    margin-right:5px;
}

.delete{
    background:#e74c3c;
}

/* modal */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.modal-content{
    background:white;
    padding:30px;
    width:550px;
    margin:5% auto;
    border-radius:8px;
}

.form-group{
    margin-bottom:12px;
}

input,select{
    width:100%;
    padding:8px;
}

</style>
</head>

<body>

<header>
Gerenciamento de Funcionários
</header>

<div class="container">

<div class="top-bar">
<h2>Funcionários do Sistema</h2>
<button onclick="abrirModal()">+ Novo Funcionário</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Matrícula</th>
<th>Nome</th>
<th>Email</th>
<th>CPF</th>
<th>Região</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>FUNC001</td>
<td>Maria Souza</td>
<td>maria@email.com</td>
<td>000.000.000-00</td>
<td>MG</td>
<td>Ativo</td>

<td class="actions">
<button>Editar</button>
<button class="delete">Excluir</button>
</td>

</tr>

</tbody>

</table>

</div>


<!-- MODAL CADASTRO -->

<div class="modal" id="modalFuncionario">

<div class="modal-content">

<h3>Cadastrar Funcionário</h3>

<div class="form-group">
<label>Matrícula</label>
<input type="text" name="MatriculaFunc">
</div>

<div class="form-group">
<label>Nome</label>
<input type="text" name="NomeFunc">
</div>

<div class="form-group">
<label>CPF</label>
<input type="text" name="CPFFunc">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="EmailFunc">
</div>

<div class="form-group">
<label>Região</label>
<input type="text" maxlength="2" name="RegiaoFunc">
</div>

<div class="form-group">
<label>Senha</label>
<input type="password" name="SenhaFunc">
</div>

<div class="form-group">
<label>Senha Inicial</label>
<select name="SenhaInicialFunc">
<option value="1">Sim</option>
<option value="0">Não</option>
</select>
</div>

<div class="form-group">
<label>Cadastrado Por (ID)</label>
<input type="number" name="CadastradoPor">
</div>

<div class="form-group">
<label>Perfil Funcionário (ID)</label>
<input type="number" name="idPerfilFuncionarios">
</div>

<div class="form-group">
<label>Status Atividade</label>
<select name="StatusAtividadeGeral_idStatus">
<option value="1">Ativo</option>
<option value="0">Inativo</option>
</select>
</div>

<div class="form-group">
<label>ID Info Bancário</label>
<input type="number" name="InfoBancario_idInfoBancario">
</div>

<div class="form-group">
<label>ID Endereço</label>
<input type="number" name="InfoEndereco_idInfoEnd">
</div>

<br>

<button>Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>

</div>


<script>

function abrirModal(){
document.getElementById("modalFuncionario").style.display="block";
}

function fecharModal(){
document.getElementById("modalFuncionario").style.display="none";
}

</script>

</body>
</html>
