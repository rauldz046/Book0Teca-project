<p-dialog
  [visible]="true"
  [modal]="true"
  [style]="{ width: '900px' }"
  [closable]="false"
>
  <div class="dialog-container">
    <div class="custom-modal-header">
      <div class="title-group">
        <div class="avatar-preview" *ngIf="isEdit">
          <img
            [src]="
              form.get('fotoperfil')?.value || 'assets/img/default-avatar.png'
            "
          />
        </div>

        <i class="pi pi-user-plus" *ngIf="!isEdit"></i>

        <div>
          <h2>
            {{
              isEdit
                ? form.get("nomeCompleto")?.value || "Editar Usuário"
                : "Novo Usuário"
            }}
          </h2>
        </div>
      </div>

      <button
        pButton
        icon="pi pi-times"
        class="p-button-text"
        (click)="fechar()"
      ></button>
    </div>

    <form [formGroup]="form">
      <div class="grid">
        <div class="col-8">
          <span class="p-float-label">
            <input pInputText formControlName="nomeCompleto" />
            <label>Nome Completo</label>
          </span>
        </div>

        <div class="col-4">
          <p-dropdown
            [options]="statusOptions"
            formControlName="status"
            optionLabel="label"
            optionValue="value"
          >
          </p-dropdown>
        </div>

        <!-- Email -->
        <div class="col-6">
          <span class="p-float-label">
            <input pInputText formControlName="email" class="w-full" />
            <label>Email</label>
          </span>
        </div>

        <!-- Telefone -->
        <div class="col-4">
          <span class="p-float-label">
            <input pInputText formControlName="telefone" class="w-full" />
            <label>Telefone</label>
          </span>
        </div>

        <!-- CPF -->
        <div class="col-4">
          <span class="p-float-label">
            <input pInputText formControlName="cpf" class="w-full" />
            <label>CPF</label>
          </span>
        </div>

        <!-- Senha -->
        <div class="col-4">
          <span class="p-float-label">
            <input pPassword formControlName="senha" class="w-full" />
            <label>Senha</label>
          </span>
        </div>

        <!-- Checkbox -->
        <div class="col-12">
          <p-checkbox
            formControlName="senhaInicial"
            [binary]="true"
            label="Forçar troca de senha no primeiro login"
          ></p-checkbox>
        </div>
      </div>
    </form>

    <ng-template pTemplate="footer">
      <button
        pButton
        label="Cancelar"
        class="p-button-text"
        (click)="fechar()"
      ></button>

      <button
        pButton
        label="Salvar"
        icon="pi pi-save"
        (click)="salvar()"
        [loading]="loading"
      ></button>
    </ng-template>
  </div>
</p-dialog>
