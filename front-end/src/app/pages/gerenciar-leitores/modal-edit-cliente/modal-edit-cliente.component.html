<p-dialog
  [visible]="true"
  [modal]="true"
  [closable]="false"
  [resizable]="false"
  [style]="{ width: '880px' }"
  [baseZIndex]="10000"
>
  <div class="dialog-container">

    <!-- HEADER -->
    <div class="custom-modal-header">
      <div class="title-group">
        <div class="avatar-preview" *ngIf="isEdit">
          <img
            [src]="form.get('fotoperfil')?.value || 'assets/img/default-avatar.png'"
          />
        </div>

        <i class="pi pi-user-plus" *ngIf="!isEdit"></i>

        <div>
          <h2>
            {{
              isEdit
                ? form.get("nomeCompleto")?.value || "Editar Usuário"
                : "Novo Usuário"
            }}
          </h2>
          <small>Gerencie as informações do usuário</small>
        </div>
      </div>

      <button
        pButton
        icon="pi pi-times"
        class="p-button-rounded p-button-text"
        (click)="fechar()"
      ></button>
    </div>

    <!-- FORM -->
    <form [formGroup]="form" class="form-container">

      <!-- SEÇÃO: DADOS PESSOAIS -->
      <div class="section-title">Dados Pessoais</div>

      <div class="grid form-grid">

        <div class="col-8">
          <span class="p-float-label">
            <input pInputText formControlName="nomeCompleto" />
            <label>Nome Completo</label>
          </span>
        </div>

        <div class="col-4">
          <span class="p-float-label">
            <p-dropdown
              [options]="statusOptions"
              formControlName="status"
              optionLabel="label"
              optionValue="value"
            ></p-dropdown>
            <label>Status</label>
          </span>
        </div>

        <div class="col-6">
          <span class="p-float-label">
            <input pInputText formControlName="email" />
            <label>Email</label>
          </span>
        </div>

        <div class="col-3">
          <span class="p-float-label">
            <input pInputText formControlName="telefone" />
            <label>Telefone</label>
          </span>
        </div>

        <div class="col-3">
          <span class="p-float-label">
            <input pInputText formControlName="cpf" />
            <label>CPF</label>
          </span>
        </div>

      </div>

      <!-- SEÇÃO: SEGURANÇA -->
      <div class="section-title">Segurança</div>

      <div class="grid form-grid">

        <div class="col-6">
          <span class="p-float-label">
            <input pPassword formControlName="senha" toggleMask="true" />
            <label>Senha</label>
          </span>
        </div>

        <div class="col-6 checkbox-box">
          <p-checkbox
            formControlName="senhaInicial"
            [binary]="true"
            label="Forçar troca no primeiro login"
          ></p-checkbox>
        </div>

      </div>

    </form>

    <!-- FOOTER -->
    <ng-template pTemplate="footer">
      <button
        pButton
        label="Cancelar"
        class="p-button-text"
        (click)="fechar()"
      ></button>

      <button
        pButton
        label="Salvar"
        icon="pi pi-save"
        (click)="salvar()"
        [loading]="loading"
      ></button>
    </ng-template>

  </div>
</p-dialog>
