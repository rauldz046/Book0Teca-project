<header class="header-container">
  
  <!-- Lado Esquerdo: Logo -->
  <div class="logo-section">
    <a routerLink="/home" class="flex align-items-center">
      <!-- Logo Principal -->
      <img src="assets/imgs/bookteca-logo.PNG" alt="BookOteca" class="logo-img">
    </a>
  </div>

  <!-- Centro: Busca -->
  <div class="search-section">
    <i class="pi pi-search search-icon"></i>
    <input
      pInputText
      type="text"
      placeholder="Pesquisar livros, autores ou registros..."
    />
  </div>

  <!-- Lado Direito: Ações (Notificações, etc - opcional) -->
  <div class="header-actions">
     <button pButton icon="pi pi-bell" class="p-button-rounded p-button-text p-button-plain text-white" style="color: white !important;"></button>
  </div>

</header>
